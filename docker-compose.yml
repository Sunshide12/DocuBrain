name: docubrain

services:
  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL 18 + pgvector
  # ─────────────────────────────────────────────────────────────────────────
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    container_name: docubrain-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: docubrain
      POSTGRES_USER: docubrain
      POSTGRES_PASSWORD: docubrain
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docubrain -d docubrain"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────
  # Redis 7 (alpine)
  # ─────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: docubrain-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────
  # Laravel 13 App — PHP 8.5
  # ─────────────────────────────────────────────────────────────────────────
  app:
    build:
      context: ./docker/app
      dockerfile: Dockerfile
    container_name: docubrain-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: docubrain
      DB_USERNAME: docubrain
      DB_PASSWORD: docubrain
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
